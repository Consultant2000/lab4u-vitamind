<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab4U Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f6fa; color: #1a1d2e; min-height: 100vh; }

    .login { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login__card { background: #fff; border-radius: 16px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
    .login__logo { font-size: 26px; font-weight: 700; color: #2563eb; margin-bottom: 6px; }
    .login__sub { font-size: 15px; color: #6b7280; margin-bottom: 28px; }
    .login__hint { font-size: 12px; color: #9ca3af; margin-bottom: 6px; line-height: 1.5; }

    label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 4px; }
    input, textarea, select { width: 100%; padding: 10px 12px; border: 1.5px solid #e5e7eb; border-radius: 8px; font-size: 14px; font-family: inherit; transition: border-color .15s; outline: none; background: #fff; color: #1a1d2e; }
    input:focus, textarea:focus, select:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
    textarea { resize: vertical; min-height: 72px; }
    input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; }

    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: all .15s; }
    .btn--primary { background: #2563eb; color: #fff; }
    .btn--primary:hover { background: #1d4ed8; }
    .btn--primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn--ghost { background: transparent; color: #6b7280; border: 1.5px solid #e5e7eb; }
    .btn--ghost:hover { border-color: #9ca3af; }
    .btn--danger { background: transparent; color: #ef4444; border: 1.5px solid #fca5a5; font-size: 12px; padding: 4px 10px; border-radius: 6px; cursor: pointer; }
    .btn--danger:hover { background: #fee2e2; }
    .btn--add { background: #eff6ff; color: #2563eb; border: 1.5px dashed #bfdbfe; font-size: 13px; padding: 8px 16px; width: 100%; margin-top: 8px; border-radius: 8px; cursor: pointer; }
    .btn--add:hover { background: #dbeafe; }

    .header { background: #fff; border-bottom: 1px solid #e5e7eb; padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 4px rgba(0,0,0,.04); gap: 16px; }
    .header__logo { font-size: 18px; font-weight: 700; color: #2563eb; white-space: nowrap; }
    .header__select { flex: 0 0 260px; }
    .header__select select { padding: 8px 12px; font-weight: 500; }
    .header__actions { display: flex; gap: 8px; align-items: center; }
    .save-status { font-size: 13px; color: #6b7280; white-space: nowrap; }
    .save-status.saving { color: #f59e0b; }
    .save-status.saved { color: #10b981; }
    .save-status.error { color: #ef4444; }

    .container { max-width: 820px; margin: 0 auto; padding: 24px; }

    .section { background: #fff; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.06); overflow: hidden; }
    .section__head { padding: 16px 20px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; user-select: none; }
    .section__head:hover { background: #f9fafb; }
    .section__title { font-size: 15px; font-weight: 600; }
    .section__arrow { font-size: 20px; color: #9ca3af; transition: transform .2s; line-height: 1; }
    .section.open .section__arrow { transform: rotate(180deg); }
    .section__body { padding: 20px; border-top: 1px solid #f3f4f6; display: none; }
    .section.open .section__body { display: block; }

    .field { margin-bottom: 14px; }
    .field:last-child { margin-bottom: 0; }

    .list-label { font-size: 13px; font-weight: 600; color: #6b7280; margin: 8px 0; }
    .list-item { border: 1.5px solid #e5e7eb; border-radius: 10px; padding: 16px; margin-bottom: 8px; }
    .list-item__head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .list-item__num { font-size: 12px; font-weight: 600; color: #9ca3af; background: #f3f4f6; padding: 2px 8px; border-radius: 4px; }

    .img-preview { width: 80px; height: 80px; object-fit: contain; border-radius: 8px; border: 1px solid #e5e7eb; margin-bottom: 6px; display: block; background: #f9fafb; }

    .loading { text-align: center; padding: 60px 24px; color: #9ca3af; font-size: 15px; }

    .toast { position: fixed; bottom: 24px; right: 24px; background: #1a1d2e; color: #fff; padding: 12px 20px; border-radius: 10px; font-size: 14px; z-index: 1000; transform: translateY(80px); opacity: 0; transition: all .3s; max-width: 320px; }
    .toast.show { transform: none; opacity: 1; }
    .toast.ok  { background: #10b981; }
    .toast.err { background: #ef4444; }

    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="login">
  <div class="login__card">
    <div class="login__logo">Lab4U</div>
    <div class="login__sub">Панель управления лендингами</div>
    <div class="field">
      <label>Пароль</label>
      <input type="password" id="patInput" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn--primary" onclick="login()" style="width:100%;margin-top:16px;justify-content:center">Войти</button>
    <p id="loginError" style="color:#ef4444;font-size:13px;margin-top:10px;display:none">Неверный пароль</p>
  </div>
</div>

<!-- ADMIN -->
<div id="adminScreen" style="display:none">
  <div class="header">
    <div class="header__logo">Lab4U Admin</div>
    <div class="header__select">
      <select id="landingSelect" onchange="switchLanding(this.value)">
        <option value="vitamind">Витамин Д</option>
        <option value="corp">Корпоративным клиентам</option>
        <option value="partner">Партнёрам</option>
      </select>
    </div>
    <div class="header__actions">
      <span id="saveStatus" class="save-status"></span>
      <button class="btn btn--primary" id="saveBtn" onclick="saveContent()">Сохранить</button>
      <button class="btn btn--ghost" onclick="logout()">Выйти</button>
    </div>
  </div>
  <div class="container" id="editor"></div>
</div>

<div id="toast" class="toast"></div>

// ─── State ────────────────────────────────────────────
let password = '', data = null, fileSha = '', currentKey = 'vitamind';
function landing() { return LANDINGS[currentKey]; }

// ─── Auth ─────────────────────────────────────────────
async function login() {
  const v = document.getElementById('patInput').value.trim();
  if (!v) return;
  // Verify password by trying to load current landing
  password = v;
  const err = document.getElementById('loginError');
  err.style.display = 'none';
  try {
    const { repo, file } = landing();
    const r = await fetch(`/api/load?password=${encodeURIComponent(v)}&repo=${encodeURIComponent(repo)}&file=${encodeURIComponent(file)}`);
    if (r.status === 401) { password = ''; err.style.display = 'block'; return; }
    if (!r.ok) throw new Error(await r.text());
    const f = await r.json();
    fileSha = f.sha;
    const bytes = Uint8Array.from(atob(f.content.replace(/\n/g,'')), c => c.charCodeAt(0));
    data = JSON.parse(new TextDecoder('utf-8').decode(bytes));
    localStorage.setItem('l4u_pwd', v);
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminScreen').style.display = 'block';
    render();
    setStatus('');
  } catch(e) {
    password = '';
    err.textContent = 'Ошибка: ' + e.message;
    err.style.display = 'block';
  }
}
function logout() { localStorage.removeItem('l4u_pwd'); location.reload(); }

// ─── Switch landing ───────────────────────────────────
function switchLanding(key) {
  currentKey = key;
  data = null;
  loadLanding();
}

// ─── API calls (через Vercel proxy) ───────────────────
async function apiLoad(repo, file) {
  const r = await fetch(`/api/load?password=${encodeURIComponent(password)}&repo=${encodeURIComponent(repo)}&file=${encodeURIComponent(file)}`);
  if (!r.ok) { const e = await r.json(); throw new Error(e.error || `Error ${r.status}`); }
  return r.json();
}
async function apiSave(repo, file, content, sha, msg) {
  const r = await fetch('/api/save', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password, repo, file, content, sha, message: msg })
  });
  if (!r.ok) { const e = await r.json(); throw new Error(e.error || `Error ${r.status}`); }
  return r.json();
}

// ─── Load ─────────────────────────────────────────────
async function loadLanding() {
  const editor = document.getElementById('editor');
  editor.innerHTML = '<div class="loading">Загрузка…</div>';
  setStatus('saving', 'Загрузка…');
  try {
    const { repo, file } = landing();
    const f = await apiLoad(repo, file);
    fileSha = f.sha;
    const bytes = Uint8Array.from(atob(f.content.replace(/\n/g, '')), c => c.charCodeAt(0));
    data = JSON.parse(new TextDecoder('utf-8').decode(bytes));
    render();
    setStatus('');
  } catch(e) {
    editor.innerHTML = `<div class="loading" style="color:#ef4444">Ошибка: ${e.message}</div>`;
    setStatus('error', 'Ошибка загрузки');
  }
}

// ─── Render ───────────────────────────────────────────
function render() {
  const root = document.getElementById('editor');
  root.innerHTML = '';
  const schema = landing().schema;
  let first = true;
  for (const [key, sec] of Object.entries(schema)) {
    if (!data[key]) continue;
    const el = mkSection(key, sec);
    if (first) { el.classList.add('open'); first = false; }
    root.appendChild(el);
  }
}

function mkSection(key, schema) {
  const sec = el('div', 'section');
  sec.innerHTML = `
    <div class="section__head" onclick="this.parentElement.classList.toggle('open')">
      <span class="section__title">${schema._label || key}</span>
      <span class="section__arrow">⌃</span>
    </div>`;
  const body = el('div', 'section__body');
  for (const [fk, fd] of Object.entries(schema)) {
    if (fk === '_label') continue;
    if (Array.isArray(fd)) body.appendChild(mkField(key, fk, data[key][fk], fd));
    else                   body.appendChild(mkList(key, fk, data[key][fk] || [], fd));
  }
  sec.appendChild(body);
  return sec;
}

function mkField(sk, fk, val, [lbl, type], idx, lk) {
  const wrap = el('div', 'field');
  const id = idx !== undefined ? `${sk}_${lk}_${idx}_${fk}` : `${sk}_${fk}`;
  const cb  = idx !== undefined
    ? `setItem('${sk}','${lk}',${idx},'${fk}',${type==='boolean'?'this.checked':'this.value'})`
    : `setVal('${sk}','${fk}',${type==='boolean'?'this.checked':'this.value'})`;

  if (type === 'boolean') {
    wrap.innerHTML = `<label style="display:flex;align-items:center;gap:8px;cursor:pointer">
      <input type="checkbox" id="${id}" ${val?'checked':''} onchange="${cb}"> ${lbl}</label>`;
  } else if (type === 'image') {
    const pid = id + '_p';
    wrap.innerHTML = `<label>${lbl}</label>
      ${val ? `<img id="${pid}" class="img-preview" src="${x(val)}" onerror="this.style.display='none'">` : ''}
      <input type="url" id="${id}" value="${x(val||'')}" placeholder="https://…"
        oninput="${cb};updImg('${pid}',this.value)">`;
  } else if (type === 'text') {
    wrap.innerHTML = `<label for="${id}">${lbl}</label>
      <textarea id="${id}" rows="3" oninput="${cb}">${x(val||'')}</textarea>`;
  } else {
    wrap.innerHTML = `<label for="${id}">${lbl}</label>
      <input type="${type==='url'?'url':'text'}" id="${id}" value="${x(val||'')}" oninput="${cb}">`;
  }
  return wrap;
}

function mkList(sk, lk, arr, schema) {
  const wrap = el('div');
  wrap.dataset.list = `${sk}.${lk}`;
  rebuildList(wrap, sk, lk, arr, schema);
  return wrap;
}

function rebuildList(wrap, sk, lk, arr, schema) {
  wrap.innerHTML = `<div class="list-label">${schema._label || lk}</div>`;
  arr.forEach((item, i) => {
    const card = el('div', 'list-item');
    card.innerHTML = `<div class="list-item__head">
      <span class="list-item__num">#${i+1}</span>
      <button class="btn btn--danger" onclick="removeItem('${sk}','${lk}',${i})">Удалить</button>
    </div>`;
    for (const [fk, fd] of Object.entries(schema)) {
      if (fk === '_label' || !Array.isArray(fd)) continue;
      card.appendChild(mkField(sk, fk, item[fk], fd, i, lk));
    }
    wrap.appendChild(card);
  });
  const addBtn = el('button', 'btn btn--add');
  addBtn.textContent = '+ Добавить';
  addBtn.onclick = () => {
    const blank = {};
    for (const [k,v] of Object.entries(schema)) {
      if (k==='_label'||!Array.isArray(v)) continue;
      blank[k] = v[1]==='boolean' ? false : '';
    }
    data[sk][lk].push(blank);
    rebuildList(wrap, sk, lk, data[sk][lk], schema);
  };
  wrap.appendChild(addBtn);
}

// ─── Mutations ────────────────────────────────────────
function setVal(sk, fk, v)          { data[sk][fk] = v; }
function setItem(sk, lk, i, fk, v) { data[sk][lk][i][fk] = v; }
function removeItem(sk, lk, i) {
  data[sk][lk].splice(i, 1);
  const wrap = document.querySelector(`[data-list="${sk}.${lk}"]`);
  if (wrap) rebuildList(wrap, sk, lk, data[sk][lk], landing().schema[sk][lk]);
}
function updImg(pid, src) {
  let img = document.getElementById(pid);
  if (!img && src) {
    img = document.createElement('img');
    img.id = pid; img.className = 'img-preview';
    const inp = document.getElementById(pid.replace('_p',''));
    inp?.parentElement.insertBefore(img, inp);
  }
  if (img) { img.src = src; img.style.display = src ? 'block' : 'none'; }
}

// ─── Save ─────────────────────────────────────────────
async function saveContent() {
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';
  setStatus('saving', 'Сохраняем…');
  try {
    const { repo, file } = landing();
    const json = JSON.stringify(data, null, 2);
    const res = await apiSave(repo, file, json, fileSha, `Admin: update ${currentKey} content`);
    fileSha = res.sha;
    setStatus('saved', 'Сохранено ✓');
    toast('Сохранено! Сайт обновится через ~30 сек', 'ok');
    setTimeout(() => setStatus(''), 3000);
  } catch(e) {
    setStatus('error', 'Ошибка: ' + e.message);
    toast('Ошибка: ' + e.message, 'err');
  }
  btn.disabled = false;
  btn.textContent = 'Сохранить';
}

// ─── Helpers ──────────────────────────────────────────
function el(tag, cls) { const e = document.createElement(tag); if (cls) e.className = cls; return e; }
function x(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function setStatus(cls, txt='') {
  const e = document.getElementById('saveStatus');
  e.className = 'save-status' + (cls ? ' '+cls : '');
  e.textContent = txt;
}
function toast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast'+(type?' '+type:'');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 4000);
}

// ─── Init ─────────────────────────────────────────────
(function() {
  const saved = localStorage.getItem('l4u_pwd');
  if (saved) {
    password = saved;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminScreen').style.display = 'block';
    loadLanding();
  }
  document.getElementById('patInput').addEventListener('keydown', e => { if (e.key==='Enter') login(); });
})();
</script>
